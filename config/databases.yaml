# Named database connections — NON-SECRET template.
#
# Copy this file to `conf/databases.local.yaml` (gitignored) and fill in the real values, including
# PASSWORD. The local file is deep-merged over this one, so nothing secret is ever committed.
# Refer to a connection by its key, e.g. get_engine("apo") / read_sql(..., conn="apo").
# Field names match the classic ODBC block and are case-insensitive.

apo:
  SERVER: ""
  USER_NAME: ""
  PASSWORD: ""        # leave blank here — set it in conf/databases.local.yaml
  DATABASE: ""
  DRIVER: "ODBC Driver 18 for SQL Server"
