# Runs on commit: ruff (lint + format), then strip notebook outputs and sync jupytext pairs.
# mypy runs in CI (it needs the project's dependencies, which pre-commit's isolated envs don't have).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
  - repo: https://github.com/mwouts/jupytext
    rev: v1.16.4
    hooks:
      - id: jupytext
        args: [--sync]
